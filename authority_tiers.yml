# Authority boost multipliers for search ranking.
#
# Patterns are matched case-insensitively as substrings of the document filename.
# The FIRST matching pattern wins — order matters.
# Documents that match no pattern score at 1.0x (no boost).
#
# To add a new source: copy any entry below, change the pattern to a distinctive
# substring of the filename, set the multiplier, and restart the app.
# No index rebuild required — boosts are applied at query time.

tiers:

  # ── Tier 1: Primary Bowen & Kerr sources (3.0×) ──────────────────────────
  - pattern: "Family Therapy in_Clinical_Practice_Chapter"
    multiplier: 3.0
    note: "FTCP book chapters"

  - pattern: "Family Evaluation"
    multiplier: 3.0
    note: "Family Evaluation: An Approach Based on Bowen Theory (Kerr & Bowen)"

  - pattern: "Bowen Basic Series Tape"
    multiplier: 3.0
    note: "Bowen lecture tapes"

  - pattern: "BOWEN-KERR INTERVIEW SERIES"
    multiplier: 3.0
    note: "Bowen-Kerr interview series"

  - pattern: "Bowen Family Systems Theory"
    multiplier: 3.0

  - pattern: "Bowen on Triangles"
    multiplier: 3.0

  - pattern: "Bowen Theory and Therapy"
    multiplier: 3.0

  - pattern: "Chronic Anxiety and Defining"
    multiplier: 3.0
    note: "Kerr Atlantic article"

  - pattern: "Cancer and the Emotional System"
    multiplier: 3.0
    note: "Kerr"

  - pattern: "Family and Society Kerr"
    multiplier: 3.0

  - pattern: "Family as a System Kerr"
    multiplier: 3.0

  - pattern: "Family Systems and Therapy Kerr"
    multiplier: 3.0

  - pattern: "Physical Illness as the Family Emotional"
    multiplier: 3.0
    note: "Kerr"

  - pattern: "Psychotherapy Past Present Future"
    multiplier: 3.0
    note: "Bowen"

  # ── Tier 2: Family Systems Journal & Family Center Reports (1.3×) ─────────
  - pattern: "Copy of "
    multiplier: 1.3
    note: "FSJ article PDFs"

  - pattern: "Family Center Reports"
    multiplier: 1.3

  # ── Tier 3: Other named theorist papers (1.15×) ───────────────────────────
  - pattern: "Papero"
    multiplier: 1.15

  - pattern: "Friedman"
    multiplier: 1.15

  - pattern: "Fogarty"
    multiplier: 1.15

  - pattern: "Guerin"
    multiplier: 1.15

  - pattern: "Toman"
    multiplier: 1.15

  # Everything else scores at 1.0x (no entry needed)
